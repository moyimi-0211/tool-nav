<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI工具导航 — 发现最好的AI工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #131320;
    --surface-hover: #1a1a2e;
    --border: #1e1e33;
    --text: #e4e4ed;
    --text-dim: #8888a6;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.25);
    --green: #22c55e;
    --orange: #f59e0b;
    --pink: #ec4899;
    --radius: 12px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(180px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb-1 { width: 500px; height: 500px; background: var(--accent); top: -200px; right: -100px; }
  .glow-orb-2 { width: 400px; height: 400px; background: var(--pink); bottom: -200px; left: -100px; }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px) saturate(180%);
    background: rgba(10,10,15,0.8);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-cta {
    font-size: 13px;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
  }
  .nav-cta:hover { border-color: var(--accent); color: var(--text); }

  /* Hero */
  .hero {
    padding: 100px 0 64px;
    text-align: center;
    position: relative;
  }
  .hero-tag {
    display: inline-block;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid rgba(99,102,241,0.3);
    background: rgba(99,102,241,0.08);
    color: #a5b4fc;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .hero h1 span {
    background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #6366f1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-desc {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 540px;
    margin: 0 auto 32px;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin-top: 40px;
  }
  .hero-stat-val {
    font-size: 32px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .hero-stat-lbl {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 20px 0 32px;
    position: sticky;
    top: 60px;
    z-index: 50;
    background: rgba(10,10,15,0.75);
    backdrop-filter: blur(16px);
  }
  .filter-btn {
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: rgba(99,102,241,0.15);
    border-color: var(--accent);
    color: #a5b4fc;
  }
  .filter-count {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Tool grid */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding-bottom: 80px;
  }

  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .tool-card:hover {
    background: var(--surface-hover);
    border-color: rgba(99,102,241,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99,102,241,0.08);
  }
  .tool-card:hover::before {
    opacity: 1;
  }
  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--pink));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tool-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }
  .tool-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .tool-icon.llm { background: rgba(99,102,241,0.15); color: #a5b4fc; }
  .tool-icon.image { background: rgba(236,72,153,0.15); color: #f9a8d4; }
  .tool-icon.video { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .tool-icon.office { background: rgba(34,197,94,0.15); color: #86efac; }
  .tool-icon.code { background: rgba(14,165,233,0.15); color: #7dd3fc; }
  .tool-icon.search { background: rgba(168,85,247,0.15); color: #c4b5fd; }

  .tool-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .tool-company {
    font-size: 12px;
    color: var(--text-dim);
  }
  .tool-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tool-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tool-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
  }
  .tool-tag.free { background: rgba(34,197,94,0.1); color: var(--green); }
  .tool-tag.paid { background: rgba(245,158,11,0.1); color: var(--orange); }
  .tool-tag.sponsored {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.15));
    color: #c084fc;
  }

  /* Sponsored highlight card */
  .tool-card.sponsored {
    border-color: rgba(99,102,241,0.25);
    background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(236,72,153,0.03));
  }
  .sponsored-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.2));
    color: #c4b5fd;
    letter-spacing: 0.5px;
  }

  /* CTA section */
  .cta-section {
    text-align: center;
    padding: 80px 0 100px;
    border-top: 1px solid var(--border);
  }
  .cta-section h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  .cta-section p {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 480px;
    margin: 0 auto 28px;
  }
  .cta-btn {
    display: inline-block;
    font-size: 14px;
    padding: 12px 32px;
    border-radius: 24px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: var(--transition);
    font-family: inherit;
    text-decoration: none;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .cta-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border);
    padding: 32px 0;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 15px;
    grid-column: 1 / -1;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hero { padding: 64px 0 40px; }
    .hero h1 { font-size: 32px; }
    .hero-stats { gap: 32px; }
    .hero-stat-val { font-size: 24px; }
    .tool-grid { grid-template-columns: 1fr; }
    .filter-bar { gap: 6px; padding: 12px 0 20px; }
    .filter-btn { font-size: 12px; padding: 5px 12px; }
  }
</style>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<!-- Nav -->
<nav class="nav">

<div class="container">

<!-- CTA -->

</section>

<!-- Footer -->
<footer class="footer container">
  <p>AI·导航 © 2026 · 人工精选，拒绝 AI 生成垃圾 · <a href="#">关于我们</a></p>
</footer>

  // === AI 绘图 ===

// Render
const grid = document.getElementById('tool-grid');
const filterCount = document.getElementById('filter-count');
const countTotal = document.getElementById('count-total');
let activeCategory = 'all';

function renderTools(category) {
  const filtered = category === 'all' ? tools : tools.filter(t => t.category === category);
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">该分类暂无工具，稍后更新 🚧</div>';

    grid.innerHTML = filtered.map((t, i) => {
      const catNames = { llm:'大语言模型', image:'AI绘图', video:'AI视频', office:'AI办公', code:'AI编程', search:'AI搜索' };
      const catIcons = { llm:'🧠', image:'🎨', video:'🎬', office:'📋', code:'💻', search:'🔍' };
      
      return `
        <a href="${t.url}" target="_blank" rel="noopener" class="tool-card${t.sponsored ? ' sponsored' : ''}">
          ${t.sponsored ? '<span class="sponsored-badge">赞助</span>' : ''}
          <div class="tool-card-header">
            <div class="tool-icon ${t.category}">${catIcons[t.category]}</div>
            <div>
              <div class="tool-name">${t.name}</div>
              <div class="tool-company">${t.company}</div>
            </div>
          </div>
          <div class="tool-desc">${t.desc}</div>
          <div class="tool-meta">
            <span class="tool-tag">${catNames[t.category]}</span>
            <span class="tool-tag ${t.pricing}">${t.pricing === 'free' ? '免费' : '付费'}</span>
          </div>
        </a>
      `;
    }).join('');
  }
  
  filterCount.textContent = `${filtered.length} 个工具`;
  if (category === 'all') countTotal.textContent = tools.length;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeCategory = this.dataset.category;
    renderTools(activeCategory);
  });
});

// Init
renderTools('all');
</script>

</body>
</html>
